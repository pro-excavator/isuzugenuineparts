<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISUZU Parts Supplier</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#D50000;color:#fff;padding:15px 30px;display:flex;justify-content:space-between}
.header a{color:#fff;margin-left:20px;text-decoration:none}

.hero{background:#1a1a1a;color:#fff;padding:60px 20px;text-align:center}
.hero h1{font-size:36px;margin-bottom:10px}
.hero p{opacity:.8;margin-bottom:20px}

.search{display:flex;justify-content:center;gap:10px}
.search input{padding:12px;width:300px;border-radius:30px;border:none}
.search button{background:#25D366;border:none;color:#fff;padding:12px 20px;border-radius:30px;cursor:pointer}

.section{padding:40px 20px;max-width:1200px;margin:auto}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}

.card{background:#fff;padding:20px;border-radius:12px}

.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px;border-bottom:1px solid #eee}

.btn{border:1px solid #D50000;color:#D50000;padding:5px 10px;border-radius:20px;cursor:pointer}
.btn:hover{background:#D50000;color:#fff}

.sidebar{display:flex;flex-direction:column;gap:20px}
.whatsapp{background:#25D366;color:#fff;padding:20px;text-align:center;border-radius:12px}

.footer{background:#111;color:#aaa;text-align:center;padding:20px;margin-top:40px}

.pagination{display:flex;justify-content:center;margin-top:20px;gap:10px}
.page-btn{padding:8px 12px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff}

/* 悬浮WhatsApp */
.wa-float{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#25D366;
 color:#fff;
 width:60px;
 height:60px;
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:28px;
 text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<div><strong>ISUZU PARTS</strong></div>
<div>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</div>
</div>

<div class="hero">
<h1>ISUZU TRUCK PARTS SUPPLIER</h1>
<p>OEM / Genuine / Fast Quotation</p>
<div class="search">
<input id="searchInput" placeholder="Enter Part Number">
<button onclick="searchParts()">Search</button>
</div>
</div>

<div class="section grid">

<div class="card">
<h3>Parts Database</h3>

<table class="table">
<thead>
<tr>
<th>Part No</th>
<th>Name</th>
<th>Weight(KG)</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
<span id="pageInfo"></span>
<button class="page-btn" onclick="nextPage()">Next</button>
</div>

</div>

<div class="sidebar">
<div class="whatsapp">
<h3>Contact</h3>
<a href="https://wa.me/8615502421365" style="color:white;font-weight:bold;">
📱 WhatsApp Now
</a>
</div>
</div>

</div>

<div class="footer">
© 2026 ISUZU PARTS SUPPLIER
</div>

<a class="wa-float" href="https://wa.me/8615502421365" target="_blank">💬</a>

<script>

const CSV_URL = "https://raw.githubusercontent.com/pro-excavator/isuzu-parts-data/main/parts.csv";

let allData = [];
let partsData = [];
let currentPage = 1;
const pageSize = 10;

/* ✅ 关键：解决CSV逗号问题 */
function parseCSV(row){
    return row.split(/,(?=(?:(?:[^"]*\"){2})*[^"]*$)/);
}

async function loadCSV(){
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const rows = text.split("\n").slice(1);

    allData = rows.map(row=>{
        const cols = parseCSV(row);

        return {
            oldPartNo: cols[0]?.trim(),
            partNo: cols[1]?.trim(),
            enName: cols[2]?.trim(),
            weight: cols[5]?.trim()
        };
    }).filter(p=>p.partNo);

    partsData = allData;
    renderTable();
}

function renderTable(){
    const tbody = document.getElementById("tableBody");

    const start = (currentPage-1)*pageSize;
    const pageData = partsData.slice(start, start+pageSize);

    tbody.innerHTML = pageData.map(p=>`
        <tr>
            <td>${p.partNo}</td>
            <td>${p.enName}</td>
            <td>${p.weight || '-'}</td>
            <td>
                <button class="btn" onclick="inquiry('${p.partNo}')">
                    Inquiry
                </button>
            </td>
        </tr>
    `).join("");

    document.getElementById("pageInfo").innerText =
        `Page ${currentPage} / ${Math.ceil(partsData.length/pageSize)}`;
}

function nextPage(){
    if(currentPage*pageSize < partsData.length){
        currentPage++;
        renderTable();
    }
}

function searchParts(){
    const q = document.getElementById("searchInput").value.trim();

    if(!q){
        partsData = allData;
        currentPage = 1;
        renderTable();
        return;
    }

    partsData = allData.filter(p=>
        (p.partNo && p.partNo.includes(q)) ||
        (p.oldPartNo && p.oldPartNo.includes(q))
    );

    currentPage = 1;
    renderTable();
}

function inquiry(partNo){
    window.open(`https://wa.me/8615502421365?text=I need ${partNo}`);
}

loadCSV();

</script>

</body>
</html>
